services:
  rag-api:
    build:
      context: .
      dockerfile: Dockerfile
    image: noon-rag-api:latest
    ports:
      - "8000:8000"
    env_file:
      - .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health', timeout=3).status==200 else 1)"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  # Optional: only run this manually when you need to re-scrape/re-chunk.
  # docker compose --profile scrape run --rm scraper
  scraper:
    build:
      context: .
      dockerfile: Dockerfile.scrape
    image: noon-rag-scraper:latest
    profiles: ["scrape"]
    volumes:
      - ./data:/app/data
      - ./chunks.json:/app/chunks.json
